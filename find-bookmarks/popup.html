<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --fg: #1a1a1a;
      --muted: #666;
      --border: #e5e5e5;
      --hover: #f5f5f5;
      --selected: #e8f0fe;
      --accent: #1a73e8;
      --highlight: #fff3a3;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #202124;
        --fg: #e8eaed;
        --muted: #9aa0a6;
        --border: #3c4043;
        --hover: #2a2b2e;
        --selected: #1f3a5f;
        --accent: #8ab4f8;
        --highlight: #5c4d00;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      width: 480px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      font-size: 13px;
    }
    .search {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #q {
      flex: 1;
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--fg);
      outline: none;
      min-width: 0;
    }
    #q:focus { border-color: var(--accent); }
    #open-manager {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--fg);
      cursor: pointer;
      font-size: 13px;
      flex-shrink: 0;
    }
    #open-manager:hover { background: var(--hover); border-color: var(--accent); color: var(--accent); }
    #results {
      max-height: 460px;
      overflow-y: auto;
    }
    .result {
      display: flex;
      align-items: flex-start;
      padding: 8px 10px;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .result:hover { background: var(--hover); }
    .result.selected { background: var(--selected); }
    .favicon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      margin-top: 2px;
      border-radius: 2px;
    }
    .info { flex: 1; min-width: 0; }
    .title {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .meta {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .path {
      color: var(--accent);
      margin-right: 6px;
      cursor: pointer;
    }
    .path:hover { text-decoration: underline; }
    mark {
      background: var(--highlight);
      color: inherit;
      padding: 0 1px;
      border-radius: 2px;
    }
    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }
    .hint {
      padding: 6px 10px;
      font-size: 11px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    kbd {
      font-family: inherit;
      font-size: 10px;
      padding: 1px 5px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--hover);
    }
  </style>
</head>
<body>
  <div class="search">
    <input id="q" type="text" placeholder="Buscar favoritos..." autofocus autocomplete="off" spellcheck="false">
    <button id="open-manager" title="Abrir vista completa (gestor)">Gestor ↗</button>
  </div>
  <div id="results"></div>
  <div class="hint">
    <span><kbd>↑</kbd><kbd>↓</kbd> navegar</span>
    <span><kbd>Enter</kbd> abrir</span>
    <span><kbd>⌘</kbd>+<kbd>Enter</kbd> nueva pestaña</span>
    <span><kbd>Esc</kbd> cerrar</span>
    <span style="margin-left:auto;opacity:.7">click en la ruta → ir a carpeta</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
