<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Mis favoritos</title>
<style>
:root {
  color-scheme: light dark;
  --bg: #ffffff;
  --bg-2: #f7f8f9;
  --fg: #1a1a1a;
  --muted: #666;
  --border: #e5e5e5;
  --hover: #f0f0f0;
  --selected: #e8f0fe;
  --accent: #1a73e8;
  --highlight: #fff3a3;
  --flash: #ffe082;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #202124;
    --bg-2: #28292c;
    --fg: #e8eaed;
    --muted: #9aa0a6;
    --border: #3c4043;
    --hover: #2a2b2e;
    --selected: #1f3a5f;
    --accent: #8ab4f8;
    --highlight: #5c4d00;
    --flash: #6b5300;
  }
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  color: var(--fg);
  font-size: 14px;
  display: grid;
  grid-template-rows: auto 1fr;
  grid-template-columns: 300px 1fr;
  grid-template-areas:
    "header header"
    "sidebar main";
  height: 100vh;
}
header {
  grid-area: header;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
header h1 {
  margin: 0;
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
}
#global-search {
  flex: 1;
  max-width: 520px;
  padding: 8px 12px;
  font-size: 14px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--fg);
  outline: none;
}
#global-search:focus { border-color: var(--accent); }
.scope {
  font-size: 12px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  user-select: none;
}
aside {
  grid-area: sidebar;
  border-right: 1px solid var(--border);
  background: var(--bg-2);
  overflow-y: auto;
  padding: 4px 0;
}
main {
  grid-area: main;
  overflow-y: auto;
  padding: 16px 24px 40px;
}
.breadcrumb {
  font-size: 13px;
  margin-bottom: 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
}
.breadcrumb a {
  color: var(--accent);
  text-decoration: none;
  cursor: pointer;
}
.breadcrumb a:hover { text-decoration: underline; }
.breadcrumb .sep { color: var(--muted); margin: 0 2px; }
.breadcrumb .current { color: var(--fg); font-weight: 600; }

.tree-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 3px 8px 3px 0;
  cursor: pointer;
  font-size: 13px;
  line-height: 1.3;
  white-space: nowrap;
  height: 26px;
  overflow: hidden;
}
.tree-row:hover { background: var(--hover); }
.tree-row.selected { background: var(--selected); }
.tree-row.selected .tree-label { color: var(--accent); font-weight: 500; }
.tree-toggle {
  flex: 0 0 14px;
  text-align: center;
  font-size: 9px;
  line-height: 1;
  color: var(--muted);
}
.tree-icon {
  flex: 0 0 16px;
  text-align: center;
  font-size: 12px;
  line-height: 1;
}
.tree-label {
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1 1 auto;
  min-width: 0;
}
.tree-count {
  font-size: 11px;
  color: var(--muted);
  margin-left: 6px;
  flex-shrink: 0;
}

.section-title {
  font-size: 11px;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.5px;
  margin: 12px 0 6px;
}
.bm-list { display: flex; flex-direction: column; gap: 2px; }
.bm {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: background-color 0.6s ease, border-color 0.6s ease;
  line-height: 1.4;
}
.bm:hover { background: var(--hover); }
.bm.flash {
  background: var(--flash);
  border-color: var(--flash);
}
.bm-fav {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  margin-top: 3px;
}
.bm.is-folder .bm-fav { display: flex; align-items: center; justify-content: center; }
.bm.is-folder .bm-fav::before { content: "📁"; }
.bm-info { flex: 1; min-width: 0; }
.bm-title {
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bm-url {
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
}
.bm-path {
  color: var(--accent);
  cursor: pointer;
  margin-right: 6px;
}
.bm-path:hover { text-decoration: underline; }
mark {
  background: var(--highlight);
  color: inherit;
  padding: 0 1px;
  border-radius: 2px;
}
.empty {
  padding: 40px;
  text-align: center;
  color: var(--muted);
}

/* three-dot action button */
.actions-btn {
  flex-shrink: 0;
  background: transparent;
  border: 0;
  padding: 0 6px;
  border-radius: 4px;
  cursor: pointer;
  color: var(--muted);
  font-size: 14px;
  line-height: 1;
  height: 20px;
  opacity: 0;
  font-family: inherit;
}
.bm:hover .actions-btn,
.tree-row:hover .actions-btn,
.actions-btn.active,
.actions-btn:focus { opacity: 1; }
.actions-btn:hover {
  background: var(--border);
  color: var(--fg);
}

/* toolbar */
.toolbar {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

/* menu */
#menu-root { position: fixed; z-index: 100; }
#menu-root:empty { display: none; }
.menu {
  position: absolute;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.18);
  padding: 4px 0;
  min-width: 220px;
  max-height: 80vh;
  overflow-y: auto;
}
.menu-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 14px;
  cursor: pointer;
  font-size: 13px;
  user-select: none;
  white-space: nowrap;
}
.menu-item:hover { background: var(--hover); }
.menu-item.disabled { color: var(--muted); cursor: default; }
.menu-item.disabled:hover { background: transparent; }
.menu-item.danger { color: #d33; }
@media (prefers-color-scheme: dark) {
  .menu-item.danger { color: #f88; }
}
.menu-item.danger:hover { background: rgba(255, 60, 60, 0.12); }
.menu-icon {
  display: inline-block;
  width: 16px;
  text-align: center;
  font-size: 12px;
  opacity: 0.75;
  flex-shrink: 0;
}
.menu-label { flex: 1; }
.menu-sep {
  height: 1px;
  background: var(--border);
  margin: 4px 0;
}

/* modal */
#modal-root {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0, 0, 0, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
}
#modal-root:empty { display: none; }
.modal {
  background: var(--bg);
  border-radius: 8px;
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
  width: 480px;
  max-width: 92vw;
  max-height: 82vh;
  display: flex;
  flex-direction: column;
}
.modal-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  font-size: 14px;
}
.modal-body {
  padding: 14px 18px;
  overflow-y: auto;
  flex: 1;
  font-size: 13px;
  line-height: 1.5;
}
.modal-footer {
  padding: 12px 18px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}
.modal label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin: 12px 0 4px;
}
.modal label:first-child { margin-top: 0; }
.modal input[type="text"],
.modal input[type="url"] {
  width: 100%;
  padding: 8px 10px;
  font-size: 14px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--fg);
  outline: none;
  font-family: inherit;
}
.modal input:focus { border-color: var(--accent); }
.btn {
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--fg);
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
}
.btn:hover { background: var(--hover); }
.btn-primary {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.btn-primary:hover { background: var(--accent); opacity: 0.92; }
.btn-danger {
  background: #d33;
  color: white;
  border-color: #d33;
}
.btn-danger:hover { background: #d33; opacity: 0.92; }

/* folder picker (used inside modal) */
.fp-wrap { display: flex; flex-direction: column; gap: 8px; }
.fp-search {
  width: 100%;
  padding: 7px 10px;
  font-size: 13px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--fg);
  outline: none;
}
.fp-search:focus { border-color: var(--accent); }
.fp-list {
  border: 1px solid var(--border);
  border-radius: 6px;
  max-height: 320px;
  min-height: 180px;
  overflow-y: auto;
}
.fp-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  cursor: pointer;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}
.fp-item:last-child { border-bottom: 0; }
.fp-item:hover { background: var(--hover); }
.fp-item.selected { background: var(--selected); }
.fp-item.selected .fp-name { color: var(--accent); font-weight: 500; }
.fp-name { flex-shrink: 0; }
.fp-path {
  font-size: 11px;
  color: var(--muted);
  margin-left: 6px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
</style>
</head>
<body>
<header>
  <h1>Mis favoritos</h1>
  <input id="global-search" type="text" placeholder="Buscar..." autocomplete="off" spellcheck="false">
  <label class="scope">
    <input type="checkbox" id="scope-all" checked> en todo
  </label>
</header>
<aside id="tree"></aside>
<main>
  <nav class="breadcrumb" id="breadcrumb"></nav>
  <div class="toolbar" id="toolbar"></div>
  <div id="content"></div>
</main>
<div id="menu-root"></div>
<div id="modal-root"></div>
<script src="manager.js"></script>
</body>
</html>
